name: Release SDK

on:
  push:
    tags: ["v*"]

jobs:
  release:
    name: Tag release for @viewengine/track
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            Install in any consumer app:

            ```bash
            bun add github:Handbook-Enterprises/ve-track#${{ github.ref_name }}
            ```

            Then wrap your worker handler with `trackedHandler` from `@viewengine/track`. See the README for full integration steps.
